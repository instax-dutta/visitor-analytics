groups:
  - name: visitor-analytics
    rules:
      - alert: BackendDown
        expr: up{job="visitor-analytics-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Visitor Analytics backend is down"
          description: "No scrape samples for the backend for over 1 minute."

      - alert: HighIngestFailureRate
        expr: |
          sum(rate(va_ingest_batches_total{status="error"}[5m])) /
          sum(rate(va_ingest_batches_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend ingest failure rate above 5%"
          description: "More than 5% of ingest batches are failing to persist."

      - alert: HighInvalidPayloadRate
        expr: rate(va_invalid_payloads_total[5m]) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated invalid payload rate"
          description: "Possible SDK/contract mismatch or spam; >10 invalid payloads/sec."

      - alert: AuthFailureSpike
        expr: rate(va_auth_failures_total[5m]) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Spike in authentication failures"
          description: "Possible credential stuffing or misconfigured clients."
