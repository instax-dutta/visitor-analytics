worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream backend {
    server backend:3000;
  }
  upstream dashboard {
    server dashboard:3001;
  }

  # Security: drop obvious scan traffic and hide server tokens.
  server_tokens off;

  server {
    listen 80;
    server_name _;

    # SDK data ingestion + API + metrics + health -> backend
    location ~ ^/(collect|api|metrics|health) {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Allow large ingest batches.
      client_max_body_size 4m;
    }

    # Everything else -> dashboard
    location / {
      proxy_pass http://dashboard;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
